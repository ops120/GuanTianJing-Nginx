    <script>
        // State
        let uploadedFiles = [];
        let selectedFileId = null;
        let parsedData = { upstreams: [], servers: [], locations: [], proxies: [], links: [] };
        let topologyNodes = [];
        let topologyEdges = [];
        let allTopologyNodes = []; // 保存所有节点（未过滤）
        let allTopologyEdges = []; // 保存所有边（未过滤）
        let zoomLevel = 1;
        let viewMode = 'merge';
        let currentLayer = 0; // 0 = 显示所有层级
        let maxLayer = 0; // 最大层级数
        let flowAnimationEnabled = true; // 流动动画开关

        // Demo Configurations
        const demoConfigs = {
            simple: { name: 'simple.conf', content: `http {
    upstream backend {
        server 192.168.1.10:8080;
        server 192.168.1.11:8080;
        server 192.168.1.12:8080 backup;
    }
    server {
        listen 80; server_name example.com;
        location / { proxy_pass http://backend; }
        location /api { proxy_pass http://backend/api; }
        location /static { root /var/www/html; }
    }
}`},
            complex: { name: 'complex.conf', content: `http {
    upstream web_cluster { least_conn; server web01:8080 weight=5; server web02:8080 weight=3; server web03:8080 backup; }
    upstream api_cluster { ip_hash; server api01:3000; server api02:3000; server api03:3000; }
    upstream db_cluster { server mysql-master:5432; server mysql-slave1:5432; server mysql-slave2:5432; }
    upstream cache_cluster { server redis01:6379; server redis02:6379; }
    server {
        listen 80; server_name www.example.com;
        location / { proxy_pass http://web_cluster; }
        location /api/v1 { proxy_pass http://api_cluster; }
        location /admin { proxy_pass http://web_cluster/admin; auth_basic "Restricted"; }
        location /static { alias /var/www/static; expires 30d; }
    }
    server { listen 80; server_name api.example.com; location / { proxy_pass http://api_cluster; } location /health { return 200 'OK'; } }
    server { listen 8080; server_name monitoring; location /metrics { proxy_pass http://cache_cluster; } }
}`},
            microservice: { name: 'microservice.conf', content: `http {
    upstream gateway { server gateway-1:9000; server gateway-2:9000; }
    upstream user_svc { server user-1:8001; server user-2:8001; }
    upstream order_svc { server order-1:8002; server order-2:8002; server order-3:8002; }
    upstream payment_svc { server payment-1:8003; server payment-2:8003; }
    upstream product_svc { server product-1:8004; server product-2:8004; }
    upstream mysql_primary { server mysql-master:3306; }
    upstream mysql_replica { server mysql-slave1:3306; server mysql-slave2:3306; }
    upstream mongodb { server mongo-1:27017; server mongo-2:27017; server mongo-3:27017; }
    upstream redis { server redis-1:6379; server redis-2:6379; server redis-3:6379; }
    server { listen 80; server_name api.example.com;
        location /api/users { proxy_pass http://user_svc; }
        location /api/orders { proxy_pass http://order_svc; }
        location /api/payments { proxy_pass http://payment_svc; }
        location /api/products { proxy_pass http://product_svc; }
    }
}`}
        };

        // DOM Elements
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const configEditor = document.getElementById('configEditor');

        // File Upload Handlers
        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
        uploadZone.addEventListener('drop', (e) => { e.preventDefault(); uploadZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            const newFiles = Array.from(files);
            let loadedCount = 0;
            
            newFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const fileData = { id: Date.now() + Math.random(), name: file.name, content: e.target.result };
                    uploadedFiles.push(fileData);
                    loadedCount++;
                    
                    // Only update stats and enable button after all files are loaded
                    if (loadedCount === newFiles.length) {
                        renderFileList();
                        updateStats();
                        document.getElementById('generateBtn').disabled = false;
                        
                        // Auto-generate topology if we have files
                        if (uploadedFiles.length > 0) {
                            setTimeout(() => {
                                generateTopology();
                            }, 100);
                        }
                    }
                };
                reader.readAsText(file);
            });
        }

        function renderFileList() {
            const container = document.getElementById('fileListContainer');
            container.innerHTML = uploadedFiles.map(file => `
                <div class="file-item ${selectedFileId === file.id ? 'active' : ''}" onclick="selectFile(${file.id})">
                    <div class="file-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg></div>
                    <div class="file-info">
                        <div class="file-name">${file.name}</div>
                        <div class="file-meta">${(file.content.length / 1024).toFixed(1)} KB</div>
                    </div>
                    <div class="file-actions">
                        <button class="file-action delete" onclick="event.stopPropagation(); deleteFile(${file.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
                    </div>
                </div>
            `).join('');
            document.getElementById('uploadedCount').textContent = `${uploadedFiles.length} 个文件`;
            document.getElementById('fileCount').textContent = `${uploadedFiles.length} 个`;
        }

        function selectFile(id) {
            selectedFileId = id;
            const file = uploadedFiles.find(f => f.id === id);
            if (file) {
                configEditor.value = file.content;
                renderFileList();
            }
        }

        function deleteFile(id) {
            uploadedFiles = uploadedFiles.filter(f => f.id !== id);
            if (selectedFileId === id) { selectedFileId = null; configEditor.value = ''; }
            renderFileList();
            updateStats();
            document.getElementById('generateBtn').disabled = uploadedFiles.length === 0;
        }

        function updateFileContent() {
            if (selectedFileId) {
                const file = uploadedFiles.find(f => f.id === selectedFileId);
                if (file) file.content = configEditor.value;
            }
        }

        configEditor.addEventListener('input', updateFileContent);

        function loadDemo(type) {
            const demo = demoConfigs[type];
            const fileData = { id: Date.now(), name: demo.name, content: demo.content };
            uploadedFiles.push(fileData);
            selectFile(fileData.id);
            renderFileList();
            updateStats();
            document.getElementById('generateBtn').disabled = false;
        }

        function setMode(mode) {
            viewMode = mode;
            document.getElementById('mergeModeBtn').classList.toggle('active', mode === 'merge');
            document.getElementById('splitModeBtn').classList.toggle('active', mode === 'split');
            if (parsedData.upstreams.length > 0 || parsedData.servers.length > 0) generateTopology();
        }

        // Layer filter function
        function toggleLayer(layer) {
            currentLayer = layer;
            
            // Update button states
            document.querySelectorAll('.layer-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.layer) === layer);
            });
            
            // Filter nodes and edges based on layer
            if (layer === 0) {
                // Show all layers
                topologyNodes = [...allTopologyNodes];
                topologyEdges = [...allTopologyEdges];
            } else {
                // Filter by layer
                topologyNodes = allTopologyNodes.filter(node => node.layer === layer);
                
                // Get node IDs in the selected layer
                const nodeIds = new Set(topologyNodes.map(n => n.id));
                
                // Filter edges to only include those between visible nodes
                topologyEdges = allTopologyEdges.filter(edge => 
                    nodeIds.has(edge.source) && nodeIds.has(edge.target)
                );
            }
            
            // Update display - skip viewBox update to prevent zoom changes
            renderSVG(true);
            updateStats();
        }

        // Update layer buttons visibility based on max layer
        function updateLayerButtons() {
            const layerButtons = document.getElementById('layerButtons');
            const buttons = layerButtons.querySelectorAll('.layer-btn');
            
            // Show/hide layer buttons based on max layer
            buttons.forEach(btn => {
                const layer = parseInt(btn.dataset.layer);
                if (layer > maxLayer && layer !== 0) {
                    btn.style.display = 'none';
                } else {
                    btn.style.display = '';
                }
            });
        }

        // Toggle flow animation
        function toggleFlow() {
            flowAnimationEnabled = !flowAnimationEnabled;
            const flowBtn = document.getElementById('flowBtn');
            flowBtn.classList.toggle('active', flowAnimationEnabled);
            
            // Re-render to update animation state
            renderSVG(true);
        }

        // Show errors panel
        function showErrors(errors) {
            const errorPanel = document.getElementById('errorPanel');
            const errorList = document.getElementById('errorList');
            
            if (!errors || errors.length === 0) {
                errorPanel.style.display = 'none';
                return;
            }
            
            errorPanel.style.display = 'block';
            
            const icons = {
                error: '❌',
                warning: '⚠️',
                info: 'ℹ️'
            };
            
            let html = '';
            errors.forEach(err => {
                html += `
                    <div class="error-item ${err.severity}">
                        <span class="error-icon">${icons[err.severity]}</span>
                        <span class="error-message">${err.message}</span>
                    </div>
                `;
            });
            
            errorList.innerHTML = html;
        }

        // Export topology as PNG
        function exportTopology() {
            const svgElement = document.getElementById('topologySvg');
            if (!svgElement) {
                alert('没有可导出的拓扑图');
                return;
            }

            // 获取 SVG 尺寸
            const svgRect = svgElement.getBoundingClientRect();
            const width = svgRect.width;
            const height = svgRect.height;

            // 序列化 SVG
            const svgData = new XMLSerializer().serializeToString(svgElement);
            const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);

            // 创建 Canvas
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = width * 2; // 2x 分辨率
            canvas.height = height * 2;

            // 填充背景色
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 加载 SVG 到 Image
            const img = new Image();
            img.onload = function() {
                ctx.scale(2, 2);
                ctx.drawImage(img, 0, 0, width, height);
                URL.revokeObjectURL(url);

                // 导出为 PNG
                canvas.toBlob(function(blob) {
                    const downloadUrl = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = `nginx_topology_${new Date().getTime()}.png`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(downloadUrl);
                }, 'image/png');
            };
            img.src = url;
        }

        // Export topology as SVG with animation
        function exportSvg() {
            const svgElement = document.getElementById('topologySvg');
            if (!svgElement) {
                alert('没有可导出的拓扑图');
                return;
            }

            // 克隆 SVG 元素
            const svgClone = svgElement.cloneNode(true);
            
            // 添加动画样式
            const style = document.createElement('style');
            style.textContent = `
                @keyframes flow {
                    to { stroke-dashoffset: -1000; }
                }
                .edge-path {
                    stroke-dasharray: 10;
                    stroke-dashoffset: 0;
                    animation: flow 2s linear infinite;
                }
                .node {
                    animation: popIn 0.5s ease-out;
                }
                @keyframes popIn {
                    from { opacity: 0; transform: scale(0); }
                    to { opacity: 1; transform: scale(1); }
                }
            `;
            svgClone.insertBefore(style, svgClone.firstChild);
            
            // 序列化 SVG
            const svgData = new XMLSerializer().serializeToString(svgClone);
            const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);
            
            // 下载 SVG
            const a = document.createElement('a');
            a.href = url;
            a.download = `nginx_topology_${new Date().getTime()}.svg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Parser
        function parseNginxConfig(config, source = 'default') {
            const result = { 
                upstreams: [], 
                servers: [], 
                locations: [], 
                proxies: [], 
                links: [],
                errors: []
            };
            
            // 预处理：如果配置在 http {} 块内，提取内部内容
            let configContent = config;
            const httpMatch = /http\s*\{([\s\S]*)\}\s*$/.exec(config.trim());
            if (httpMatch) {
                configContent = httpMatch[1];
            }
            
            // Parse upstream blocks - support both multi-line and single-line formats
            // 改进正则：支持单行紧凑格式 { server xxx; server yyy; }
            const upstreamRegex = /upstream\s+([\w_]+)(?:\s*:\s*(\d+))?\s*\{([^}]+)\}/g;
            let match;
            while ((match = upstreamRegex.exec(configContent)) !== null) {
                const name = match[1];
                const port = match[2];
                const body = match[3];
                const servers = [];
                
                // 更灵活的 server 解析，支持各种格式
                const serverRegex = /server\s+([^;]+);/g;
                let serverMatch;
                while ((serverMatch = serverRegex.exec(body)) !== null) {
                    const serverAddr = serverMatch[1].trim();
                    servers.push(serverAddr);
                    
                    // 提取后端服务器信息 - 支持 hostname:port 格式
                    const ipMatch = /([\w\-\.]+):?(\d+)?/.exec(serverAddr);
                    // 提取 weight 参数
                    const weightMatch = /weight=(\d+)/.exec(serverAddr);
                    const weight = weightMatch ? parseInt(weightMatch[1]) : 1;
                    
                    if (ipMatch) {
                        const backendHost = ipMatch[1];
                        const backendPort = ipMatch[2] || port || '80';
                        
                        result.links.push({
                            type: 'upstream_backend',
                            source: `${name}${port ? ':' + port : ''}`,
                            target: backendHost,
                            port: backendPort,
                            sourceFile: source,
                            weight: weight
                        });
                    }
                }
                
                // Use name:port as the upstream identifier
                const upstreamId = port ? `${name}:${port}` : name;
                result.upstreams.push({ name: upstreamId, originalName: name, port, servers, source });
            }
            
            // Parse server blocks - support both multi-line and single-line formats
            // 使用更灵活的方式匹配 server 块，支持嵌套的 location
            // 改进：使用 { 和 } 的配对来匹配整个 server 块
            const serverBlockRegex = /server\s*\{((?:[^{}]|\{[^{}]*\})*)\}/g;
            while ((match = serverBlockRegex.exec(configContent)) !== null) {
                const body = match[1];
                console.log('=== Found server block ===');
                console.log('Server body:', body.substring(0, 200) + '...');
                
                // Extract listen port
                const listenMatch = /listen\s+(\d+)/.exec(body);
                const port = listenMatch ? listenMatch[1] : '80';
                
                // Extract server_name - handle comments and various formats
                const nameMatch = /server_name\s+([^;\n]+);/.exec(body);
                let serverName = `*:${port}`;
                if (nameMatch) {
                    // Clean up server_name: remove comments and trim
                    serverName = nameMatch[1].split('#')[0].trim();
                    if (!serverName) serverName = `*:${port}`;
                }
                console.log('Server name:', serverName);
                
                // First pass: collect all proxy_pass upstream names in this server block
                const serverUpstreams = [];
                // 改进 location 正则，支持单行格式：location /path { proxy_pass xxx; }
                const locationRegexFirst = /location\s+([^\s{]+)\s*\{([^}]+)\}/g;
                let firstMatch;
                while ((firstMatch = locationRegexFirst.exec(body)) !== null) {
                    const locationBody = firstMatch[2];
                    const proxyMatch = /proxy_pass\s+([^;]+);/.exec(locationBody);
                    if (proxyMatch) {
                        const proxyTarget = proxyMatch[1].trim();
                        const isUpstream = /^https?:\/\/[a-zA-Z_][\w_]*(?::\d+)?$/.test(proxyTarget);
                        if (isUpstream) {
                            const upstreamName = proxyTarget.replace(/^https?:\/\//, '');
                            if (!serverUpstreams.includes(upstreamName)) {
                                serverUpstreams.push(upstreamName);
                            }
                        }
                    }
                }
                console.log('Server upstreams:', serverUpstreams);
                
                // Determine display name: if server_name is IP and has upstream, show upstream name
                let displayName = serverName;
                const isIP = /^\d+\.\d+\.\d+\.\d+$/.test(serverName);
                if (isIP && serverUpstreams.length > 0) {
                    // If server_name is IP and has upstream proxy, use the first upstream name as display
                    displayName = serverUpstreams[0];
                }
                
                result.servers.push({ name: serverName, displayName, port, source, upstreams: serverUpstreams });
                
                // Parse location blocks within server - support both multi-line and single-line formats
                const locationRegex = /location\s+([^\s{]+)\s*\{([^}]+)\}/g;
                let locationMatch;
                while ((locationMatch = locationRegex.exec(body)) !== null) {
                    const path = locationMatch[1].trim();
                    const locationBody = locationMatch[2];
                    
                    // 调试：打印找到的 location
                    console.log(`Found location: ${path}`);
                    
                    // Find proxy_pass - be more flexible with whitespace
                    const proxyMatch = /proxy_pass\s+([^;]+);/.exec(locationBody);
                    const rootMatch = /root\s+([^;]+);/.exec(locationBody);
                    
                    if (proxyMatch) {
                        const proxyTarget = proxyMatch[1].trim();
                        console.log(`  Found proxy_pass: ${proxyTarget}`);
                        
                        // Determine if proxy target is an upstream or direct IP
                        // Support upstream with or without port: http://backend or http://backend:8080
                        const isUpstream = /^https?:\/\/[a-zA-Z_][\w_-]*(?::\d+)?(?:\/|$)/.test(proxyTarget);
                        let upstreamName = null;
                        if (isUpstream) {
                            // Remove http:// or https:// and extract upstream name (without trailing path)
                            upstreamName = proxyTarget.replace(/^https?:\/\//, '').split('/')[0];
                            console.log(`  Detected upstream: ${upstreamName}`);
                        }
                        
                        // Extract IP if it's a direct IP proxy
                        const ipMatch = /https?:\/\/(\d+\.\d+\.\d+\.\d+):?(\d+)?/.exec(proxyTarget);
                        
                        result.proxies.push({ 
                            location: path, 
                            target: proxyTarget,
                            type: isUpstream ? 'upstream' : 'direct',
                            upstreamName: upstreamName,
                            targetIP: ipMatch ? ipMatch[1] : null,
                            targetPort: ipMatch ? (ipMatch[2] || '80') : null,
                            source 
                        });
                        
                        // Create link for topology
                        if (ipMatch) {
                            // Direct IP proxy (Nginx to Nginx chain)
                            result.links.push({
                                type: 'nginx_chain',
                                source: serverName,
                                target: ipMatch[1],
                                port: ipMatch[2] || '80',
                                location: path,
                                sourceFile: source
                            });
                        } else if (isUpstream) {
                            // Upstream proxy (with optional port)
                            result.links.push({
                                type: 'server_to_upstream',
                                source: serverName,
                                target: upstreamName,
                                location: path,
                                sourceFile: source
                            });
                        }
                    } else if (rootMatch) {
                        // Static file serving
                        result.links.push({
                            type: 'server_to_static',
                            source: serverName,
                            target: 'static_files',
                            root: rootMatch[1].trim(),
                            sourceFile: source
                        });
                    }
                    
                    result.locations.push({ 
                        path, 
                        type: proxyMatch ? 'proxy' : (rootMatch ? 'static' : 'other'), 
                        target: proxyMatch ? proxyMatch[1].trim() : (rootMatch ? rootMatch[1].trim() : ''), 
                        source 
                    });
                }
            }
            
            // ========== 配置错误检测 ==========
            
            // 1. 检测 proxy_pass 指向的 upstream 是否存在
            const upstreamNames = new Set(result.upstreams.map(u => u.name));
            result.proxies.forEach(proxy => {
                if (proxy.type === 'upstream' && proxy.upstreamName) {
                    const upstreamName = proxy.upstreamName.split(':')[0]; // 去掉端口
                    if (!upstreamNames.has(upstreamName)) {
                        result.errors.push({
                            type: 'upstream_not_found',
                            severity: 'error',
                            message: `Upstream "${upstreamName}" 未定义`,
                            location: proxy.location,
                            source: proxy.source
                        });
                    }
                }
            });
            
            // 2. 检测循环引用 (A -> B -> A)
            const linkMap = new Map();
            result.links.forEach(link => {
                const key = `${link.source} -> ${link.target}`;
                linkMap.set(key, link);
            });
            
            result.links.forEach(link => {
                const reverseKey = `${link.target} -> ${link.source}`;
                if (linkMap.has(reverseKey)) {
                    result.errors.push({
                        type: 'circular_reference',
                        severity: 'warning',
                        message: `检测到循环引用：${link.source} <-> ${link.target}`,
                        location: link.location,
                        source: link.sourceFile
                    });
                }
            });
            
            // 3. 检测空的 upstream（没有定义 backend servers）
            result.upstreams.forEach(upstream => {
                if (!upstream.servers || upstream.servers.length === 0) {
                    result.errors.push({
                        type: 'empty_upstream',
                        severity: 'warning',
                        message: `Upstream "${upstream.name}" 没有定义后端服务器`,
                        source: upstream.source
                    });
                }
            });
            
            // 4. 检测 server 块没有 location
            result.servers.forEach(server => {
                const serverLocations = result.locations.filter(loc => loc.source === server.source);
                if (serverLocations.length === 0) {
                    result.errors.push({
                        type: 'no_location',
                        severity: 'info',
                        message: `Server "${server.name}" 没有定义 location`,
                        source: server.source
                    });
                }
            });
            
            return result;
        }

        // Merge parsed data from multiple configs
        function mergeParsedData() {
            parsedData = { upstreams: [], servers: [], locations: [], proxies: [], links: [], errors: [] };
            uploadedFiles.forEach(file => {
                const parsed = parseNginxConfig(file.content, file.name);
                parsedData.upstreams.push(...parsed.upstreams);
                parsedData.servers.push(...parsed.servers);
                parsedData.locations.push(...parsed.locations);
                parsedData.proxies.push(...parsed.proxies);
                parsedData.links.push(...parsed.links);
                parsedData.errors.push(...parsed.errors);
            });
            
            // 显示错误面板
            showErrors(parsedData.errors);
        }

        function updateStats() {
            mergeParsedData();
            document.getElementById('statFiles').textContent = uploadedFiles.length;
            document.getElementById('statUpstreams').textContent = parsedData.upstreams.length;
            document.getElementById('statServers').textContent = parsedData.servers.length;
            document.getElementById('statLocations').textContent = parsedData.locations.length;
            document.getElementById('upstreamCount').textContent = `${parsedData.upstreams.length} 个`;
            document.getElementById('serverCount').textContent = `${parsedData.servers.length} 个`;
            document.getElementById('locationCount').textContent = `${parsedData.locations.length} 个`;
            document.getElementById('proxyCount').textContent = `${parsedData.proxies.length} 个`;
            document.getElementById('linkCount').textContent = `${parsedData.links.length} 个`;
            renderAnalysisList('upstreamList', parsedData.upstreams.map(u => u.name), 'upstream');
            renderAnalysisList('serverList', parsedData.servers.map(s => s.name), 'server');
            renderAnalysisList('locationList', parsedData.locations.slice(0, 8).map(l => l.path), 'location');
            renderAnalysisList('proxyList', parsedData.proxies.map(p => `${p.type === 'upstream' ? '↑' : '→'} ${p.target}`), 'proxy');
            renderAnalysisList('linkList', parsedData.links.map(l => `${l.source} → ${l.target}`), 'backend');
        }

        function renderAnalysisList(elementId, items, type) {
            const container = document.getElementById(elementId);
            const uniqueItems = [...new Set(items)];
            container.innerHTML = uniqueItems.slice(0, 8).map(item => `
                <div class="analysis-item"><div class="item-dot ${type}"></div><div class="item-text">${item}</div></div>
            `).join('');
            if (uniqueItems.length > 8) container.innerHTML += `<div class="analysis-item"><span style="color: var(--text-muted); font-size: 0.65rem;">+${uniqueItems.length - 8} more...</span></div>`;
        }

        // Generate Topology
        function generateTopology() {
            mergeParsedData();
            if (parsedData.upstreams.length === 0 && parsedData.servers.length === 0) return;
            updateStats();
            renderTopology();
            document.getElementById('generateBtn').textContent = '重新生成';
        }

        function renderTopology() {
            const canvas = document.getElementById('topologyCanvas');
            const emptyState = document.getElementById('emptyState');
            const legend = document.getElementById('topologyLegend');
            const layerControls = document.getElementById('layerControls');
            const svg = document.getElementById('topologySvg');
            
            if (!svg) return;
            
            emptyState.style.display = 'none';
            canvas.style.display = 'block';
            legend.style.display = 'flex';
            layerControls.style.display = 'flex';
            document.getElementById('flowControl').style.display = 'flex';
            document.getElementById('topologyStatus').textContent = '已生成';

            topologyNodes = [];
            topologyEdges = [];

            const centerX = 500;
            const centerY = 350;

            // Client node - Layer 0
            topologyNodes.push({ id: 'client', label: 'Client', type: 'client', x: centerX, y: 60, layer: 0 });

            // Group nodes by source file if split mode
            if (viewMode === 'split') {
                renderSplitTopology();
            } else {
                renderMergeTopology(centerX);
            }

            // Save all nodes and edges for layer filtering
            allTopologyNodes = [...topologyNodes];
            allTopologyEdges = [...topologyEdges];
            
            // Calculate max layer
            maxLayer = Math.max(...allTopologyNodes.map(n => n.layer || 0));
            
            // Update layer buttons visibility
            updateLayerButtons();
            
            // Reset to show all layers
            currentLayer = 0;
            document.querySelectorAll('.layer-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.layer) === 0);
            });

            document.getElementById('statNodes').textContent = topologyNodes.length;
            renderSVG();
        }

        function renderMergeTopology(centerX) {
            // Use links to build topology
            if (parsedData.links.length > 0) {
                // 调试输出：打印所有 links
                console.log('=== parsedData.links ===');
                parsedData.links.forEach((link, i) => {
                    console.log(`${i}: ${link.type} - ${link.source} → ${link.target}`);
                });
                console.log('========================');
                
                renderTopologyFromLinks(centerX);
            } else {
                renderTopologyFromParsedData(centerX);
            }
        }

        function renderTopologyFromLinks(centerX) {
            // Build topology based on extracted links
            const nodeMap = new Map();
            const edgeList = [];
            const serverNodes = [];
            const upstreamNodes = [];
            const backendNodes = [];
            
            console.log('=== renderTopologyFromLinks ===');
            console.log('parsedData.servers:', parsedData.servers);
            console.log('parsedData.upstreams:', parsedData.upstreams);
            console.log('parsedData.links:', parsedData.links);
            
            // Add client node - Layer 0
            nodeMap.set('client', { id: 'client', label: 'Client', type: 'client', x: centerX, y: 60, layer: 0 });
            
            // First pass: Create all nodes and categorize them
            // Process all servers
            parsedData.servers.forEach((server, idx) => {
                const nodeId = `server_${server.name.replace(/[:.]/g, '_')}`;
                if (!nodeMap.has(nodeId)) {
                    const node = {
                        id: nodeId,
                        label: server.displayName || server.name,
                        type: 'server',
                        x: 0,
                        y: 0,
                        layer: 1,
                        source: server.source
                    };
                    nodeMap.set(nodeId, node);
                    serverNodes.push(node);
                }
            });
            
            // Process all upstreams - Layer 2
            parsedData.upstreams.forEach((upstream, idx) => {
                const displayLabel = upstream.originalName || upstream.name;
                const nodeId = `upstream_${upstream.name.replace(/[:.]/g, '_')}`;
                if (!nodeMap.has(nodeId)) {
                    const node = {
                        id: nodeId,
                        label: `${displayLabel}${upstream.port ? ':' + upstream.port : ''}`,
                        type: 'upstream',
                        x: 0,
                        y: 0,
                        layer: 2,
                        source: upstream.source,
                        servers: upstream.servers
                    };
                    nodeMap.set(nodeId, node);
                    upstreamNodes.push(node);
                }
            });
            
            // 额外检查：从 links 中提取所有 server 和 upstream，确保没有遗漏
            parsedData.links.forEach(link => {
                // 确保所有 link 的 source server 都被创建
                if (link.type === 'server_to_upstream' || link.type === 'nginx_chain' || link.type === 'server_to_static') {
                    const sourceId = `server_${link.source.replace(/[:.]/g, '_')}`;
                    if (!nodeMap.has(sourceId)) {
                        const node = {
                            id: sourceId,
                            label: link.source,
                            type: 'server',
                            x: 0,
                            y: 0,
                            layer: 1,
                            source: link.sourceFile
                        };
                        nodeMap.set(sourceId, node);
                        serverNodes.push(node);
                    }
                }
                
                // 确保所有 link 的 target upstream 都被创建
                if (link.type === 'server_to_upstream') {
                    const targetId = `upstream_${link.target.replace(/[:.]/g, '_')}`;
                    if (!nodeMap.has(targetId)) {
                        const node = {
                            id: targetId,
                            label: link.target,
                            type: 'upstream',
                            x: 0,
                            y: 0,
                            layer: 2,
                            source: link.sourceFile
                        };
                        nodeMap.set(targetId, node);
                        upstreamNodes.push(node);
                    }
                }
            });
            
            // Process all backend IPs from links - Layer 3
            const backendIPs = new Set();
            parsedData.links.forEach(link => {
                if (link.type === 'upstream_backend') {
                    backendIPs.add(link.target);
                }
            });
            
            backendIPs.forEach((ip, idx) => {
                const nodeId = `backend_${ip.replace(/[.]/g, '_')}`;
                if (!nodeMap.has(nodeId)) {
                    const node = {
                        id: nodeId,
                        label: ip,
                        type: 'backend',
                        x: 0,
                        y: 0,
                        layer: 3 // Backends are in layer 3
                    };
                    nodeMap.set(nodeId, node);
                    backendNodes.push(node);
                }
            });
            
            // Calculate positions based on topology flow
            // Layer 1: First level servers (directly connected to client)
            const level1Servers = serverNodes.slice(0, Math.ceil(serverNodes.length / 2));
            level1Servers.forEach((node, idx) => {
                const spacing = Math.min(200, 800 / level1Servers.length);
                const totalWidth = (level1Servers.length - 1) * spacing;
                node.x = centerX - totalWidth / 2 + idx * spacing;
                node.y = 150;
                node.layer = 1;
            });
            
            // Layer 2: Second level servers (nginx_chain targets) and upstream nodes
            const level2Servers = serverNodes.slice(Math.ceil(serverNodes.length / 2));
            const level2Items = [...level2Servers, ...upstreamNodes];
            
            if (level2Items.length > 0) {
                const spacing = Math.min(180, 700 / level2Items.length);
                const totalWidth = (level2Items.length - 1) * spacing;
                level2Items.forEach((node, idx) => {
                    node.x = centerX - totalWidth / 2 + idx * spacing;
                    node.y = 280;
                    // Servers are layer 2, upstreams are already layer 2
                });
            }
            
            // Layer 3: Backend nodes
            if (backendNodes.length > 0) {
                const spacing = Math.min(160, 800 / backendNodes.length);
                const totalWidth = (backendNodes.length - 1) * spacing;
                backendNodes.forEach((node, idx) => {
                    node.x = centerX - totalWidth / 2 + idx * spacing;
                    node.y = 410;
                    node.layer = 3;
                });
            }
            
            // Create edges from links
            parsedData.links.forEach(link => {
                if (link.type === 'nginx_chain') {
                    const sourceId = `server_${link.source.replace(/[:.]/g, '_')}`;
                    const targetId = `server_${link.target.replace(/[:.]/g, '_')}`;
                    
                    // Create target server node if it doesn't exist - Layer 2
                    if (!nodeMap.has(targetId)) {
                        // Try to find displayName for this target IP
                        const targetServer = parsedData.servers.find(s => s.name === link.target);
                        const displayLabel = (targetServer && targetServer.displayName) || link.target;
                        
                        const targetNode = {
                            id: targetId,
                            label: displayLabel, // 使用 displayName 如果有的话
                            type: 'server',
                            x: centerX,
                            y: 280,
                            layer: 2, // nginx_chain targets are layer 2
                            source: link.sourceFile
                        };
                        nodeMap.set(targetId, targetNode);
                    }
                    
                    if (nodeMap.has(sourceId)) {
                        edgeList.push({ 
                            source: sourceId, 
                            target: targetId, 
                            type: 'proxy',
                            location: link.location || '/',
                            root: link.root || null
                        });
                    }
                } else if (link.type === 'server_to_upstream') {
                    const sourceId = `server_${link.source.replace(/[:.]/g, '_')}`;
                    const targetId = `upstream_${link.target.replace(/[:.]/g, '_')}`;
                    
                    // 确保 source server 节点存在
                    if (!nodeMap.has(sourceId)) {
                        const serverNode = {
                            id: sourceId,
                            label: link.source,
                            type: 'server',
                            x: centerX,
                            y: 150,
                            layer: 1,
                            source: link.sourceFile
                        };
                        nodeMap.set(sourceId, serverNode);
                        serverNodes.push(serverNode);
                    }
                    
                    // 确保 target upstream 节点存在
                    if (!nodeMap.has(targetId)) {
                        const upstreamNode = {
                            id: targetId,
                            label: link.target,
                            type: 'upstream',
                            x: centerX,
                            y: 280,
                            layer: 2,
                            source: link.sourceFile
                        };
                        nodeMap.set(targetId, upstreamNode);
                        upstreamNodes.push(upstreamNode);
                    }
                    
                    if (nodeMap.has(sourceId) && nodeMap.has(targetId)) {
                        edgeList.push({ 
                            source: sourceId, 
                            target: targetId, 
                            type: 'upstream',
                            location: link.location || '/'
                        });
                    }
                } else if (link.type === 'upstream_backend') {
                    const sourceId = `upstream_${link.source.replace(/[:.]/g, '_')}`;
                    const targetId = `backend_${link.target.replace(/[.]/g, '_')}`;
                    
                    console.log(`Creating upstream_backend edge: ${sourceId} → ${targetId}`);
                    
                    // Create target backend node if it doesn't exist - Layer 3
                    if (!nodeMap.has(targetId)) {
                        const targetNode = {
                            id: targetId,
                            label: link.target,
                            type: 'backend',
                            x: centerX,
                            y: 410,
                            layer: 3 // Upstream backends are layer 3
                        };
                        nodeMap.set(targetId, targetNode);
                    }
                    
                    if (nodeMap.has(sourceId) && nodeMap.has(targetId)) {
                        edgeList.push({ 
                            source: sourceId, 
                            target: targetId, 
                            type: 'upstream',
                            location: link.location || '/'
                        });
                        console.log(`  Edge created successfully`);
                    } else {
                        console.log(`  Missing nodes: sourceId=${sourceId}, targetId=${targetId}`);
                    }
                } else if (link.type === 'server_to_static') {
                    const sourceId = `server_${link.source.replace(/[:.]/g, '_')}`;
                    const targetId = `static_${link.root.replace(/[\/\s]/g, '_')}`;
                    
                    // Create static files node if it doesn't exist
                    if (!nodeMap.has(targetId)) {
                        const targetNode = {
                            id: targetId,
                            label: link.root,
                            type: 'static',
                            x: centerX,
                            y: 410,
                            layer: 3
                        };
                        nodeMap.set(targetId, targetNode);
                    }
                    
                    if (nodeMap.has(sourceId) && nodeMap.has(targetId)) {
                        edgeList.push({ 
                            source: sourceId, 
                            target: targetId, 
                            type: 'internal',
                            root: link.root
                        });
                    }
                }
            });
            
            // Add client to first server edge
            const firstServer = serverNodes[0];
            if (firstServer) {
                edgeList.unshift({ source: 'client', target: firstServer.id, type: 'internal' });
            }
            
            topologyNodes = Array.from(nodeMap.values());
            topologyEdges = edgeList;
        }

        function renderTopologyFromParsedData(centerX) {
            // Nginx gateway - 居中 - Layer 1
            topologyNodes.push({ id: 'nginx', label: 'Nginx Gateway', type: 'nginx', x: centerX, y: 150, layer: 1 });
            topologyEdges.push({ source: 'client', target: 'nginx', type: 'internal' });

            // Servers - 居中排列 - Layer 2
            const servers = [...new Map(parsedData.servers.map(s => [s.name, s])).values()];
            const serverCount = servers.length || 1;
            const serverSpacing = Math.min(150, 800 / serverCount);
            const totalServerWidth = (serverCount - 1) * serverSpacing;
            const serverStartX = centerX - totalServerWidth / 2;
            servers.forEach((server, i) => {
                topologyNodes.push({ id: `server_${i}`, label: server.displayName || server.name, type: 'server', x: serverStartX + i * serverSpacing, y: 280, layer: 2, source: server.source });
                topologyEdges.push({ source: 'nginx', target: `server_${i}`, type: 'proxy' });
            });

            // Upstreams - 居中排列 - Layer 3
            const upstreams = [...new Map(parsedData.upstreams.map(u => [u.name, u])).values()];
            const upstreamCount = upstreams.length || 1;
            const upstreamSpacing = Math.min(160, 800 / upstreamCount);
            const totalUpstreamWidth = (upstreamCount - 1) * upstreamSpacing;
            const upstreamStartX = centerX - totalUpstreamWidth / 2;
            upstreams.forEach((upstream, i) => {
                topologyNodes.push({ id: `upstream_${i}`, label: upstream.name, type: 'upstream', x: upstreamStartX + i * upstreamSpacing, y: 420, layer: 3, source: upstream.source, servers: upstream.servers });
                const targetServerIdx = i % serverCount;
                if (servers[targetServerIdx]) topologyEdges.push({ source: `server_${targetServerIdx}`, target: `upstream_${i}`, type: 'upstream' });
            });

            // Backends - 居中排列 - Layer 4
            const allBackends = new Set();
            upstreams.forEach(u => u.servers.forEach(s => allBackends.add(s.split(':')[0])));
            const backends = Array.from(allBackends);
            const backendCount = backends.length || 1;
            const backendSpacing = Math.min(120, 800 / backendCount);
            const totalBackendWidth = (backendCount - 1) * backendSpacing;
            const backendStartX = centerX - totalBackendWidth / 2;
            backends.forEach((backend, i) => {
                topologyNodes.push({ id: `backend_${i}`, label: backend, type: 'backend', x: backendStartX + i * backendSpacing, y: 560, layer: 4 });
                const targetUpstreamIdx = Math.floor(i / Math.max(1, Math.ceil(backendCount / upstreamCount)));
                if (upstreams[targetUpstreamIdx]) topologyEdges.push({ source: `upstream_${targetUpstreamIdx}`, target: `backend_${i}`, type: 'upstream' });
            });
        }

        function renderSplitTopology() {
            const sources = [...new Set(uploadedFiles.map(f => f.name))];
            const colWidth = 1000 / sources.length;

            sources.forEach((source, sourceIdx) => {
                const colCenterX = colWidth * sourceIdx + colWidth / 2;
                const servers = parsedData.servers.filter(s => s.source === source);
                const upstreams = parsedData.upstreams.filter(u => u.source === source);

                // Nginx per file - Layer 1, 使用 server_name 作为标签
                const nginxLabel = servers.length > 0 ? servers[0].name : `Nginx ${sourceIdx + 1}`;
                topologyNodes.push({ id: `nginx_${sourceIdx}`, label: nginxLabel, type: 'nginx', x: colCenterX, y: 150, layer: 1, source });
                topologyEdges.push({ source: 'client', target: `nginx_${sourceIdx}`, type: 'internal' });

                // Servers - Layer 2
                servers.forEach((server, i) => {
                    topologyNodes.push({ id: `server_${sourceIdx}_${i}`, label: server.displayName || server.name, type: 'server', x: colCenterX, y: 280 + i * 60, layer: 2 });
                    topologyEdges.push({ source: `nginx_${sourceIdx}`, target: `server_${sourceIdx}_${i}`, type: 'proxy' });
                });

                // Upstreams - Layer 3
                upstreams.forEach((upstream, i) => {
                    const upY = 280 + servers.length * 60 + 60 + i * 60;
                    topologyNodes.push({ id: `upstream_${sourceIdx}_${i}`, label: upstream.name, type: 'upstream', x: colCenterX, y: upY, layer: 3, servers: upstream.servers });
                    if (servers[0]) topologyEdges.push({ source: `server_${sourceIdx}_0`, target: `upstream_${sourceIdx}_${i}`, type: 'upstream' });
                });
            });
        }

        const gradientDefsHTML = `
            <defs>
                <linearGradient id="edgeCyan" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#00a8cc"/></linearGradient>
                <linearGradient id="edgeMagenta" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ff00aa"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
                <linearGradient id="edgeGreen" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00ff88"/><stop offset="100%" stop-color="#00cc66"/></linearGradient>
                <marker id="arrowCyan" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#00d4ff"/></marker>
                <marker id="arrowMagenta" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#ff00aa"/></marker>
                <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#00ff88"/></marker>
                <marker id="arrowCyanAnimated" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
                    <circle r="3" fill="#00ffff">
                        <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
                    </circle>
                </marker>
                <marker id="arrowMagentaAnimated" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
                    <circle r="3" fill="#ff00ff">
                        <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
                    </circle>
                </marker>
                <marker id="arrowGreenAnimated" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
                    <circle r="3" fill="#00ff00">
                        <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
                    </circle>
                </marker>
            </defs>
        `;

        function renderSVG(skipViewBoxUpdate = false) {
            const svg = document.getElementById('topologySvg');
            const canvas = document.getElementById('topologyCanvas');
            
            // 获取画布实际尺寸
            const canvasWidth = canvas.clientWidth || 1000;
            const canvasHeight = canvas.clientHeight || 700;
            
            // 计算所有节点的边界框
            if (topologyNodes.length === 0) return;
            
            // 只有在不是拖动节点时才重新计算 viewBox
            if (!skipViewBoxUpdate) {
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                topologyNodes.forEach(node => {
                    minX = Math.min(minX, node.x);
                    maxX = Math.max(maxX, node.x);
                    minY = Math.min(minY, node.y);
                    maxY = Math.max(maxY, node.y);
                });
                
                // 添加边界的节点大小余量
                const margin = 100;
                minX -= margin;
                maxX += margin;
                minY -= margin;
                maxY += margin;
                
                // 计算实际需要的 viewBox
                const contentWidth = maxX - minX;
                const contentHeight = maxY - minY;
                
                // 计算缩放比例以适应画布
                const scaleX = canvasWidth / contentWidth;
                const scaleY = canvasHeight / contentHeight;
                const autoScale = Math.min(scaleX, scaleY, 1.5); // 最大放大 1.5 倍
                
                // 计算 viewBox 的中心点
                const viewBoxCenterX = (minX + maxX) / 2;
                const viewBoxCenterY = (minY + maxY) / 2;
                
                // 计算 viewBox 尺寸（应用缩放）
                const viewBoxWidth = contentWidth / autoScale;
                const viewBoxHeight = contentHeight / autoScale;
                
                // 更新 viewBox 状态（重置缩放）
                viewBoxState = {
                    x: viewBoxCenterX - viewBoxWidth / 2,
                    y: viewBoxCenterY - viewBoxHeight / 2,
                    width: viewBoxWidth,
                    height: viewBoxHeight
                };
                // 保存初始状态用于复原
                initialViewBoxState = { ...viewBoxState };
                
                // 设置 viewBox，使内容居中
                const viewBox = `${viewBoxState.x} ${viewBoxState.y} ${viewBoxState.width} ${viewBoxState.height}`;
                svg.setAttribute('viewBox', viewBox);
            }

            const edgesHtml = topologyEdges.map((edge, i) => {
                const src = topologyNodes.find(n => n.id === edge.source);
                const tgt = topologyNodes.find(n => n.id === edge.target);
                if (!src || !tgt) return '';
                
                const gradientMap = { upstream: 'url(#edgeCyan)', proxy: 'url(#edgeMagenta)', internal: 'url(#edgeGreen)' };
                const arrowMap = { upstream: 'arrowCyan', proxy: 'arrowMagenta', internal: 'arrowGreen' };
                const animatedArrowMap = { upstream: 'arrowCyanAnimated', proxy: 'arrowMagentaAnimated', internal: 'arrowGreenAnimated' };
                
                const gradientId = `flowGradient_${i}`;
                const animateId = `flowAnimate_${i}`;
                const particleId = `flowParticle_${i}`;
                
                // 计算路径长度和中心点
                const dx = tgt.x - src.x;
                const dy = tgt.y - src.y;
                const length = Math.sqrt(dx * dx + dy * dy);
                const midX = (src.x + tgt.x) / 2;
                const midY = (src.y + tgt.y) / 2;
                
                // 边的颜色
                const edgeColor = gradientMap[edge.type].includes('Cyan') ? '#00d4ff' : gradientMap[edge.type].includes('Magenta') ? '#ff00aa' : '#00ff88';
                
                // 链路权重（默认 1）
                const weight = edge.weight || 1;
                const strokeWidth = 2 + (weight - 1) * 0.5; // 权重越高，线条越粗
                const animationSpeed = Math.max(0.5, 1.5 - (weight - 1) * 0.1); // 权重越高，动画越快
                
                // 路由标签处理 - 支持 location 和 root 两种类型
                let routeLabel = '';
                if (edge.location) {
                    // location 类型：去掉前后斜杠，如 "/api/" -> "API"
                    routeLabel = edge.location.replace(/^\/+|\/+$/g, '').toUpperCase();
                    if (!routeLabel) routeLabel = '/'; // 根路径显示为 /
                } else if (edge.root) {
                    // root 类型：显示 root 路径
                    routeLabel = edge.root;
                }
                
                // 如果标签为空，则不显示
                if (!routeLabel) {
                    routeLabel = '';
                }
                
                // 计算标签位置，考虑边界检查
                const labelOffset = 12;
                let labelX = midX + (dy / length) * labelOffset;
                let labelY = midY - (dx / length) * labelOffset;
                
                // 边界检查，确保标签不超出 SVG 范围
                const padding = 30;
                const labelWidth = routeLabel ? Math.max(30, routeLabel.length * 6) : 0;
                const labelHeight = 16;
                
                if (labelX - labelWidth/2 < padding) labelX = padding + labelWidth/2;
                if (labelX + labelWidth/2 > 1000 - padding) labelX = 1000 - padding - labelWidth/2;
                if (labelY - labelHeight/2 < padding) labelY = padding + labelHeight/2;
                if (labelY + labelHeight/2 > 700 - padding) labelY = 700 - padding - labelHeight/2;
                
                // 生成边的基础线和动画粒子
                let html = `
                    <defs>
                        <linearGradient id="${gradientId}" gradientUnits="userSpaceOnUse" x1="${src.x}" y1="${src.y}" x2="${tgt.x}" y2="${tgt.y}">
                            <stop offset="0%" stop-color="${edgeColor}" stop-opacity="0.2"/>
                            <stop offset="85%" stop-color="${edgeColor}" stop-opacity="0.7"/>
                            <stop offset="100%" stop-color="${edgeColor}" stop-opacity="1"/>
                        </linearGradient>
                    </defs>
                    <path d="M${src.x},${src.y} L${tgt.x},${tgt.y}" stroke="${gradientMap[edge.type]}" stroke-width="${strokeWidth}" opacity="0.4"/>
                `;
                
                // 如果启用了流动动画，添加动画粒子
                if (flowAnimationEnabled) {
                    html += `
                        <circle r="5" fill="${edgeColor}" opacity="0.9">
                            <animateMotion dur="${animationSpeed + i * 0.1}s" repeatCount="indefinite" rotate="auto">
                                <mpath href="#${animateId}"/>
                            </animateMotion>
                            <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
                        </circle>
                        <circle r="3" fill="#ffffff" opacity="0.6">
                            <animateMotion dur="${animationSpeed + i * 0.1}s" repeatCount="indefinite" rotate="auto" begin="${0.3 + i * 0.1}s">
                                <mpath href="#${animateId}"/>
                            </animateMotion>
                        </circle>
                    `;
                }
                
                // 添加路由标签（仅在有内容时）
                if (routeLabel) {
                    html += `
                        <g class="edge-label" transform="translate(${labelX}, ${labelY})">
                            <rect x="-${labelWidth/2}" y="-${labelHeight/2}" width="${labelWidth}" height="${labelHeight}" rx="3" fill="rgba(10, 10, 15, 0.95)" stroke="${edgeColor}" stroke-width="1"/>
                            <text x="0" y="4" fill="${edgeColor}" font-size="9" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="500">${routeLabel.length > 10 ? routeLabel.substring(0, 10) + '..' : routeLabel}</text>
                        </g>
                    `;
                }
                
                // 隐藏的路径用于动画
                html += `<path id="${animateId}" d="M${src.x},${src.y} L${tgt.x},${tgt.y}" fill="none" stroke="none"/>`;
                
                // 添加边路径，用于 SVG 导出时的动画
                html += `<path class="edge-path" d="M${src.x},${src.y} L${tgt.x},${tgt.y}" stroke="${edgeColor}" stroke-width="${strokeWidth}" fill="none" stroke-opacity="0.3" stroke-dasharray="5,5"/>`;
                
                return html;
            }).join('');

            const nodesHtml = topologyNodes.map((node, i) => {
                const colors = { 
                    client: { fill: '#1a1a25', stroke: '#ffffff', text: '#ffffff' }, 
                    nginx: { fill: '#1a1a25', stroke: '#8b5cf6', text: '#8b5cf6' }, 
                    server: { fill: '#1a1a25', stroke: '#ff00aa', text: '#ff00aa' }, 
                    upstream: { fill: '#1a1a25', stroke: '#00d4ff', text: '#00d4ff' }, 
                    backend: { fill: '#1a1a25', stroke: '#ffdd00', text: '#ffdd00' },
                    static: { fill: '#1a1a25', stroke: '#00ff88', text: '#00ff88' } // 添加 static 类型
                };
                const color = colors[node.type] || { fill: '#1a1a25', stroke: '#ffffff', text: '#ffffff' }; // 添加默认颜色
                const size = node.type === 'nginx' || node.type === 'client' ? 50 : 40;
                return `
                    <g class="topology-node node" transform="translate(${node.x}, ${node.y})" 
                       style="cursor: move;"
                       onmousedown="startNodeDrag(event, '${node.id}')"
                       onmouseenter="showTooltip(event, '${node.id}')" 
                       onmouseleave="hideTooltip()">
                        <circle r="${size / 2}" fill="${color.fill}" stroke="${color.stroke}" stroke-width="2" style="pointer-events: all;"/>
                        ${getNodeIcon(node.type, size, color)}
                        <text y="${size / 2 + 18}" class="node-label" fill="${color.text}" font-size="10" text-anchor="middle" style="pointer-events: none;">${node.label.length > 14 ? node.label.substring(0, 14) + '...' : node.label}</text>
                    </g>
                `;
            }).join('');

            svg.innerHTML = gradientDefsHTML + `<g>${edgesHtml}${nodesHtml}</g>`;
        }

        function getNodeIcon(type, size, color) {
            const icons = {
                client: `<circle r="8" fill="${color.text}" opacity="0.3"/><circle r="5" fill="${color.text}"/>`,
                nginx: `<rect x="-12" y="-12" width="24" height="24" rx="4" fill="none" stroke="${color.text}" stroke-width="2"/><circle r="5" fill="${color.text}"/>`,
                server: `<rect x="-14" y="-10" width="28" height="20" rx="3" fill="none" stroke="${color.text}" stroke-width="2"/><line x1="-8" y1="-4" x2="8" y2="-4" stroke="${color.text}" stroke-width="2"/><line x1="-8" y1="2" x2="4" y2="2" stroke="${color.text}" stroke-width="2"/>`,
                upstream: `<path d="M0,-12 L10,6 L-10,6 Z" fill="none" stroke="${color.text}" stroke-width="2"/><circle r="4" fill="${color.text}"/>`,
                backend: `<circle r="10" fill="none" stroke="${color.text}" stroke-width="2"/><circle r="4" fill="${color.text}"/>`
            };
            return icons[type] || icons.client;
        }

        function showTooltip(event, nodeId) {
            const node = topologyNodes.find(n => n.id === nodeId);
            if (!node) return;
            const tooltip = document.getElementById('nodeTooltip');
            let content = `<div class="tooltip-header">${node.label}</div>`;
            content += `<div class="tooltip-row"><span class="tooltip-label">Type</span><span class="tooltip-value">${node.type}</span></div>`;
            if (node.source) content += `<div class="tooltip-row"><span class="tooltip-label">Source</span><span class="tooltip-value">${node.source}</span></div>`;
            if (node.servers) content += `<div class="tooltip-row"><span class="tooltip-label">Backends</span><span class="tooltip-value">${node.servers.length}</span></div>`;
            tooltip.innerHTML = content;
            tooltip.style.display = 'block';
            
            // 获取 tooltip 实际尺寸
            const tooltipRect = tooltip.getBoundingClientRect();
            const tooltipWidth = tooltipRect.width;
            const tooltipHeight = tooltipRect.height;
            const padding = 15;
            
            // 使用节点坐标而不是鼠标坐标
            let left = node.x + padding;
            let top = node.y + padding;
            
            // 检查右边界
            if (left + tooltipWidth > window.innerWidth - padding) {
                left = node.x - tooltipWidth - padding;
            }
            
            // 检查下边界
            if (top + tooltipHeight > window.innerHeight - padding) {
                top = node.y - tooltipHeight - padding;
            }
            
            // 检查左边界
            if (left < padding) {
                left = padding;
            }
            
            // 检查上边界
            if (top < padding) {
                top = padding;
            }
            
            tooltip.style.left = left + 'px';
            tooltip.style.top = top + 'px';
        }

        function hideTooltip() { document.getElementById('nodeTooltip').style.display = 'none'; }

        // Node Dragging
        let isDraggingNode = false;
        let draggedNodeId = null;
        let dragStartPos = { x: 0, y: 0 };
        let dragNodeStartPos = { x: 0, y: 0 };

        function startNodeDrag(event, nodeId) {
            event.preventDefault();
            event.stopPropagation();
            
            isDraggingNode = true;
            draggedNodeId = nodeId;
            
            const svg = document.getElementById('topologySvg');
            const rect = svg.getBoundingClientRect();
            
            // Get current mouse position in screen coordinates
            dragStartPos = {
                x: event.clientX,
                y: event.clientY
            };
            
            // Get node current position
            const node = topologyNodes.find(n => n.id === nodeId);
            if (node) {
                dragNodeStartPos = { x: node.x, y: node.y };
            }
            
            // Add visual feedback
            const nodeElement = svg.querySelector(`g[onmousedown*="${nodeId}"]`);
            if (nodeElement) {
                nodeElement.classList.add('dragging');
            }
            
            // Add global mouse listeners
            window.addEventListener('mousemove', onNodeDrag);
            window.addEventListener('mouseup', stopNodeDrag);
        }

        function onNodeDrag(event) {
            if (!isDraggingNode || !draggedNodeId) return;
            
            const svg = document.getElementById('topologySvg');
            if (!svg) return;
            
            const rect = svg.getBoundingClientRect();
            
            // Calculate mouse delta in screen coordinates
            const dx = event.clientX - dragStartPos.x;
            const dy = event.clientY - dragStartPos.y;
            
            // Convert to SVG coordinates
            const scaleX = viewBoxState.width / rect.width;
            const scaleY = viewBoxState.height / rect.height;
            
            const svgDx = dx * scaleX;
            const svgDy = dy * scaleY;
            
            // Update node position
            const node = topologyNodes.find(n => n.id === draggedNodeId);
            if (node) {
                node.x = dragNodeStartPos.x + svgDx;
                node.y = dragNodeStartPos.y + svgDy;
                
                // Re-render to update positions (edges will update automatically)
                // Skip viewBox update to prevent zoom changes during drag
                renderSVG(true);
                
                // Re-apply dragging class after re-render
                const nodeElement = svg.querySelector(`g[onmousedown*="${draggedNodeId}"]`);
                if (nodeElement) {
                    nodeElement.classList.add('dragging');
                }
            }
        }

        function stopNodeDrag() {
            const svg = document.getElementById('topologySvg');
            if (svg && draggedNodeId) {
                const nodeElement = svg.querySelector(`g[onmousedown*="${draggedNodeId}"]`);
                if (nodeElement) {
                    nodeElement.classList.remove('dragging');
                }
            }
            
            isDraggingNode = false;
            draggedNodeId = null;
            window.removeEventListener('mousemove', onNodeDrag);
            window.removeEventListener('mouseup', stopNodeDrag);
        }

        // Pan and Zoom State
        let isPanning = false;
        let startPan = { x: 0, y: 0 };
        let viewBoxState = { x: 0, y: 0, width: 1000, height: 700 };
        let initialViewBoxState = { x: 0, y: 0, width: 1000, height: 700 };

        // Initialize pan and zoom
        function initPanAndZoom() {
            const canvas = document.getElementById('topologyCanvas');
            if (!canvas) return;

            // Mouse down - start panning
            canvas.addEventListener('mousedown', (e) => {
                // Don't pan if dragging a node
                if (isDraggingNode) return;
                
                if (e.button === 0) { // Left click only
                    isPanning = true;
                    canvas.classList.add('panning');
                    startPan = { x: e.clientX, y: e.clientY };
                    e.preventDefault();
                    e.stopPropagation();
                }
            });

            // Mouse move - panning
            window.addEventListener('mousemove', (e) => {
                if (!isPanning) return;
                
                const dx = e.clientX - startPan.x;
                const dy = e.clientY - startPan.y;
                
                // Convert pixel movement to viewBox coordinates
                const scaleX = viewBoxState.width / canvas.clientWidth;
                const scaleY = viewBoxState.height / canvas.clientHeight;
                
                viewBoxState.x -= dx * scaleX;
                viewBoxState.y -= dy * scaleY;
                
                startPan = { x: e.clientX, y: e.clientY };
                
                applyPanAndZoom();
                e.preventDefault();
            });

            // Mouse up - stop panning
            window.addEventListener('mouseup', () => {
                isPanning = false;
                canvas.classList.remove('panning');
            });

            // Mouse wheel - zoom
            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                const delta = e.deltaY > 0 ? 1.1 : 0.9;
                const newWidth = viewBoxState.width * delta;
                const newHeight = viewBoxState.height * delta;
                
                // Zoom towards mouse position
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                // Calculate the point in SVG coordinates
                const svgPointX = viewBoxState.x + (mouseX / rect.width) * viewBoxState.width;
                const svgPointY = viewBoxState.y + (mouseY / rect.height) * viewBoxState.height;
                
                // Adjust viewBox to zoom towards mouse
                viewBoxState.x = svgPointX - (mouseX / rect.width) * newWidth;
                viewBoxState.y = svgPointY - (mouseY / rect.height) * newHeight;
                viewBoxState.width = newWidth;
                viewBoxState.height = newHeight;
                
                applyPanAndZoom();
            }, { passive: false });
        }

        function applyPanAndZoom() {
            const svg = document.getElementById('topologySvg');
            if (!svg || viewBoxState.width === 0) return;
            
            const newViewBox = `${viewBoxState.x} ${viewBoxState.y} ${viewBoxState.width} ${viewBoxState.height}`;
            svg.setAttribute('viewBox', newViewBox);
        }

        function zoomIn() {
            const svg = document.getElementById('topologySvg');
            if (!svg) return;
            
            const zoomFactor = 0.8;
            viewBoxState.width *= zoomFactor;
            viewBoxState.height *= zoomFactor;
            viewBoxState.x += viewBoxState.width * (1 - zoomFactor) / 2;
            viewBoxState.y += viewBoxState.height * (1 - zoomFactor) / 2;
            applyPanAndZoom();
        }

        function zoomOut() {
            const svg = document.getElementById('topologySvg');
            if (!svg) return;
            
            const zoomFactor = 1.25;
            viewBoxState.width *= zoomFactor;
            viewBoxState.height *= zoomFactor;
            viewBoxState.x -= viewBoxState.width * (zoomFactor - 1) / 2;
            viewBoxState.y -= viewBoxState.height * (zoomFactor - 1) / 2;
            applyPanAndZoom();
        }

        function resetZoom() {
            viewBoxState = { ...initialViewBoxState };
            applyPanAndZoom();
        }

        // Initialize on DOM ready
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('fileCount').textContent = '0 个';
            initPanAndZoom();
        });
    </script>
</body>
</html>
