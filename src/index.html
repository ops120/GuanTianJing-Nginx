<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nginx Topology Generator | 多文件拓扑分析</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --bg-card: #15151f;
            --border-color: #2a2a3a;
            --border-glow: #3d3d5c;
            --text-primary: #e8e8f0;
            --text-secondary: #8888a0;
            --text-muted: #5a5a70;
            --accent-cyan: #00d4ff;
            --accent-cyan-dim: #00a8cc;
            --accent-magenta: #ff00aa;
            --accent-purple: #8b5cf6;
            --accent-green: #00ff88;
            --accent-orange: #ff8800;
            --accent-yellow: #ffdd00;
            --gradient-cyber: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-purple) 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px; pointer-events: none; z-index: 0;
        }

        .bg-glow { position: fixed; width: 600px; height: 600px; border-radius: 50%; filter: blur(150px); opacity: 0.12; pointer-events: none; z-index: 0; }
        .bg-glow-1 { top: -200px; right: -100px; background: var(--accent-cyan); animation: float 20s ease-in-out infinite; }
        .bg-glow-2 { bottom: -200px; left: -100px; background: var(--accent-magenta); animation: float 25s ease-in-out infinite reverse; }

        @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(50px, 50px); } }

        /* Header */
        .header {
            position: relative; z-index: 10; padding: 1.5rem 2rem;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border-color); background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(20px);
        }

        .logo { display: flex; align-items: center; gap: 1rem; }
        .logo-icon { width: 40px; height: 40px; }
        .logo-text { font-size: 1.25rem; font-weight: 700; background: var(--gradient-cyber); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-sub { font-size: 0.7rem; color: var(--text-secondary); letter-spacing: 0.15em; text-transform: uppercase; }

        .header-stats { display: flex; gap: 2rem; }
        .stat-item { text-align: center; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; font-weight: 600; color: var(--accent-cyan); }
        .stat-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }

        /* Main Layout */
        .main-container { position: relative; z-index: 10; display: grid; grid-template-columns: 350px 1fr 300px; gap: 1.5rem; padding: 1.5rem 2rem 2rem; min-height: calc(100vh - 80px); }

        /* Panel */
        .panel { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.4); display: flex; flex-direction: column; }
        .panel-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; background: var(--bg-secondary); }
        .panel-title { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; display: flex; align-items: center; gap: 0.5rem; }
        .panel-title::before { content: ''; width: 4px; height: 14px; background: var(--gradient-cyber); border-radius: 2px; }
        .panel-badge { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; padding: 0.2rem 0.6rem; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 20px; color: var(--accent-cyan); }
        .panel-content { flex: 1; padding: 1.25rem; overflow-y: auto; }
        .panel-content::-webkit-scrollbar { width: 6px; }
        .panel-content::-webkit-scrollbar-thumb { background: var(--border-glow); border-radius: 3px; }

        /* Upload Zone */
        .upload-zone { border: 2px dashed var(--border-glow); border-radius: 12px; padding: 2rem 1rem; text-align: center; transition: all 0.3s; cursor: pointer; position: relative; overflow: hidden; }
        .upload-zone::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent); transition: left 0.5s; }
        .upload-zone:hover::before, .upload-zone.dragover::before { left: 100%; }
        .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent-cyan); background: rgba(0, 212, 255, 0.05); }
        .upload-icon { width: 48px; height: 48px; margin: 0 auto 0.75rem; opacity: 0.6; transition: all 0.3s; }
        .upload-zone:hover .upload-icon { opacity: 1; transform: scale(1.1); }
        .upload-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.3rem; }
        .upload-hint { font-size: 0.7rem; color: var(--text-muted); }
        .upload-input { display: none; }

        /* File List */
        .file-list { margin-top: 1rem; }
        .file-list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
        .file-list-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
        .file-list-count { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--accent-cyan); }

        .file-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0.75rem; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 0.5rem; transition: all 0.2s; }
        .file-item:hover { border-color: var(--border-glow); }
        .file-item.active { border-color: var(--accent-cyan); background: rgba(0, 212, 255, 0.1); }

        .file-icon { width: 28px; height: 28px; background: var(--bg-secondary); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .file-icon svg { width: 16px; height: 16px; color: var(--accent-cyan); }
        .file-info { flex: 1; min-width: 0; }
        .file-name { font-size: 0.75rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-meta { font-size: 0.65rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
        .file-actions { display: flex; gap: 0.25rem; }
        .file-action { width: 24px; height: 24px; background: transparent; border: none; border-radius: 4px; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .file-action:hover { background: var(--bg-secondary); color: var(--accent-cyan); }
        .file-action.delete:hover { color: #ff4444; }
        .file-action svg { width: 14px; height: 14px; }

        /* Quick Actions */
        .quick-actions { margin-top: 1rem; }
        .action-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 0.5rem; }
        .action-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .action-btn { flex: 1; min-width: 70px; padding: 0.5rem 0.75rem; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-secondary); font-size: 0.7rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.3rem; }
        .action-btn:hover { background: var(--bg-secondary); border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .action-btn svg { width: 12px; height: 12px; }

        /* Config Editor */
        .config-section { margin-top: 1.25rem; }
        .config-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
        .config-title { font-size: 0.7rem; font-weight: 600; color: var(--text-secondary); }
        .config-editor { width: 100%; background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 8px; padding: 0.75rem; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; line-height: 1.5; color: var(--text-primary); min-height: 200px; resize: vertical; }
        .config-editor:focus { outline: none; border-color: var(--accent-cyan); box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1); }
        .config-editor::-webkit-scrollbar { width: 4px; }
        .config-editor::-webkit-scrollbar-thumb { background: var(--border-glow); border-radius: 2px; }

        /* Center - Topology */
        .topology-container { flex: 1; position: relative; min-height: 500px; background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
        .topology-canvas { width: 100%; height: 100%; position: relative; }
        .topology-svg { width: 100%; height: 100%; }

        .empty-state { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: var(--text-muted); }
        .empty-icon { width: 64px; height: 64px; margin: 0 auto 1rem; opacity: 0.3; }
        .empty-title { font-size: 0.9rem; margin-bottom: 0.3rem; color: var(--text-secondary); }
        .empty-hint { font-size: 0.7rem; }

        .topology-controls { position: absolute; bottom: 1rem; right: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .control-btn { width: 32px; height: 32px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .control-btn:hover { background: var(--bg-tertiary); border-color: var(--accent-cyan); color: var(--accent-cyan); }
        .control-btn svg { width: 16px; height: 16px; }

        /* Topology Legend */
        .topology-legend { position: absolute; bottom: 1rem; left: 1rem; display: flex; flex-wrap: wrap; gap: 0.75rem; padding: 0.75rem; background: rgba(21, 21, 31, 0.9); border: 1px solid var(--border-color); border-radius: 8px; }
        .legend-item { display: flex; align-items: center; gap: 0.3rem; font-size: 0.65rem; color: var(--text-secondary); }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .legend-line { width: 20px; height: 2px; border-radius: 1px; }

        /* Error Panel */
        .error-panel {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            max-width: 350px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(21, 21, 31, 0.95);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem;
            z-index: 20;
        }

        .error-panel-title {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .error-item {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            padding: 0.5rem;
            margin-bottom: 0.3rem;
            border-radius: 4px;
            font-size: 0.65rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .error-item.error {
            background: rgba(255, 68, 68, 0.1);
            border-left: 2px solid #ff4444;
        }

        .error-item.warning {
            background: rgba(255, 221, 0, 0.1);
            border-left: 2px solid #ffdd00;
        }

        .error-item.info {
            background: rgba(0, 212, 255, 0.1);
            border-left: 2px solid #00d4ff;
        }

        .error-icon {
            font-size: 0.7rem;
            flex-shrink: 0;
        }

        .error-item.error .error-icon { color: #ff4444; }
        .error-item.warning .error-icon { color: #ffdd00; }
        .error-item.info .error-icon { color: #00d4ff; }

        .error-message {
            color: var(--text-secondary);
            line-height: 1.4;
        }

        /* Right - Analysis */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
        .stat-card { background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 8px; padding: 0.75rem; text-align: center; }
        .stat-card-value { font-family: 'JetBrains Mono', monospace; font-size: 1.25rem; font-weight: 600; color: var(--text-primary); }
        .stat-card-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; }

        .analysis-section { margin-bottom: 1rem; }
        .analysis-card { background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 8px; padding: 0.75rem; margin-bottom: 0.5rem; }
        .analysis-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
        .analysis-type { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent-cyan); display: flex; align-items: center; gap: 0.3rem; }
        .analysis-type::before { content: ''; width: 5px; height: 5px; background: currentColor; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .analysis-count { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-muted); }
        .analysis-items { display: flex; flex-direction: column; gap: 0.3rem; max-height: 120px; overflow-y: auto; }
        .analysis-item { display: flex; align-items: center; gap: 0.4rem; padding: 0.35rem 0.5rem; background: var(--bg-secondary); border-radius: 4px; font-size: 0.7rem; }
        .item-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .item-dot.nginx { background: var(--accent-purple); }
        .item-dot.upstream { background: var(--accent-cyan); }
        .item-dot.server { background: var(--accent-magenta); }
        .item-dot.location { background: var(--accent-green); }
        .item-dot.proxy { background: var(--accent-orange); }
        .item-dot.backend { background: var(--accent-yellow); }
        .item-text { flex: 1; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-source { font-size: 0.6rem; color: var(--text-muted); padding: 0.1rem 0.3rem; background: var(--bg-tertiary); border-radius: 3px; flex-shrink: 0; }

        /* Generate Button */
        .generate-btn { width: 100%; padding: 0.9rem; background: var(--gradient-cyber); border: none; border-radius: 8px; color: var(--bg-primary); font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 0.1em; position: relative; overflow: hidden; }
        .generate-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); transition: left 0.5s; }
        .generate-btn:hover::before { left: 100%; }
        .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3); }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Merge Mode Toggle */
        .mode-toggle { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .mode-btn { flex: 1; padding: 0.5rem; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-secondary); font-size: 0.7rem; cursor: pointer; transition: all 0.2s; }
        .mode-btn.active { background: rgba(0, 212, 255, 0.1); border-color: var(--accent-cyan); color: var(--accent-cyan); }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes nodeAppear { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        .node-appear { animation: nodeAppear 0.5s ease forwards; }

        /* Node Tooltip */
        .node-tooltip { position: absolute; background: var(--bg-card); border: 1px solid var(--border-glow); border-radius: 8px; padding: 0.75rem; min-width: 180px; z-index: 100; pointer-events: none; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .tooltip-header { font-size: 0.8rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--accent-cyan); }
        .tooltip-row { display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 0.25rem; }
        .tooltip-label { color: var(--text-muted); }
        .tooltip-value { color: var(--text-primary); font-family: 'JetBrains Mono', monospace; }

        /* Topology Canvas Interactions */
        .topology-canvas { cursor: grab; }
        .topology-canvas.panning { cursor: grabbing; }
        .topology-canvas:hover { cursor: grab; }
        
        /* Node Dragging */
        .topology-node.dragging { opacity: 0.8; }
        .topology-node:hover circle { stroke-width: 3 !important; filter: drop-shadow(0 0 8px currentColor); }

        /* Layer Filter Controls */
        .layer-controls {
            position: absolute;
            top: 1rem;
            left: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding: 0.75rem;
            background: rgba(21, 21, 31, 0.95);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            z-index: 10;
        }
        
        .layer-controls-title {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.25rem;
        }
        
        .layer-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }
        
        .layer-btn {
            padding: 0.4rem 0.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-secondary);
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .layer-btn:hover {
            background: var(--bg-secondary);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }
        
        .layer-btn.active {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            font-weight: 600;
        }

        /* Edge Labels */
        .edge-label text {
            pointer-events: none;
            user-select: none;
        }

        /* Flow Animation Controls */
        .flow-control {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem;
            background: rgba(21, 21, 31, 0.95);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            z-index: 10;
        }

        .flow-btn {
            width: 36px;
            height: 36px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .flow-btn:hover {
            background: var(--bg-secondary);
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .flow-btn.active {
            background: rgba(0, 255, 136, 0.15);
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        /* Export Button */
        #exportBtn:hover {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .flow-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .main-container { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <header class="header">
        <div class="logo">
            <svg class="logo-icon" viewBox="0 0 48 48" fill="none">
                <rect x="4" y="4" width="40" height="40" rx="8" stroke="url(#logoGrad)" stroke-width="2"/>
                <circle cx="24" cy="24" r="8" stroke="url(#logoGrad)" stroke-width="2"/>
                <circle cx="24" cy="24" r="3" fill="url(#logoGrad)"/>
                <line x1="24" y1="4" x2="24" y2="12" stroke="url(#logoGrad)" stroke-width="2"/>
                <line x1="24" y1="36" x2="24" y2="44" stroke="url(#logoGrad)" stroke-width="2"/>
                <line x1="4" y1="24" x2="12" y2="24" stroke="url(#logoGrad)" stroke-width="2"/>
                <line x1="36" y1="24" x2="44" y2="24" stroke="url(#logoGrad)" stroke-width="2"/>
                <defs><linearGradient id="logoGrad" x1="0" y1="0" x2="48" y2="48"><stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs>
            </svg>
            <div>
                <div class="logo-text">Nginx Topology</div>
                <div class="logo-sub">Multi-Config Analyzer</div>
            </div>
        </div>
        <div class="header-stats">
            <div class="stat-item"><div class="stat-value" id="statFiles">0</div><div class="stat-label">配置文件</div></div>
            <div class="stat-item"><div class="stat-value" id="statNodes">0</div><div class="stat-label">节点</div></div>
            <div class="stat-item"><div class="stat-value" id="statUpstreams">0</div><div class="stat-label">上游服务</div></div>
        </div>
    </header>

    <main class="main-container">
        <!-- Left Panel -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">配置文件</div>
                <div class="panel-badge" id="fileCount">0 个</div>
            </div>
            <div class="panel-content">
                <div class="upload-zone" id="uploadZone">
                    <input type="file" class="upload-input" id="fileInput" accept=".conf,.txt,.nginx" multiple>
                    <svg class="upload-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M32 8v32M20 28l12-12 12 12" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M8 48v8a4 4 0 004 4h40a4 4 0 004-4v-8" stroke-linecap="round"/>
                    </svg>

                        <div class="analysis-header"><div class="analysis-type">Location 路由</div><div class="analysis-count" id="locationCount">0 个</div></div>

                        <div class="analysis-items" id="proxyList"></div>

                        <div class="analysis-header"><div class="analysis-type" style="color: var(--accent-green)">链路关系</div><div class="analysis-count" id="linkCount">0 个</div></div>
                        <div class="analysis-items" id="linkList"></div>
