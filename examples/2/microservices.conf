upstream gateway_service {
    ip_hash;
    server 172.16.1.10:9000;
    server 172.16.1.11:9000;
}

upstream user_service_v1 {
    server 172.16.2.10:8001;
    server 172.16.2.11:8001;
}

upstream order_service_v1 {
    server 172.16.3.10:8002;
    server 172.16.3.11:8002;
    server 172.16.3.12:8002;
}

upstream payment_gateway {
    server 172.16.4.10:8010;
    server 172.16.4.11:8010 backup;
}

upstream notification_service {
    server 172.16.5.10:8020;
    server 172.16.5.11:8020;
}

server {
    listen 80;
    server_name api.microservices.local;
    
    location /api/v1/gateway {
        proxy_pass http://gateway_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /api/v1/users {
        proxy_pass http://user_service_v1;
        proxy_set_header Host $host;
    }
    
    location /api/v1/orders {
        proxy_pass http://order_service_v1;
        proxy_set_header Host $host;
    }
    
    location /api/v1/payments {
        proxy_pass http://payment_gateway;
        proxy_set_header Host $host;
    }
    
    location /api/v1/notifications {
        proxy_pass http://notification_service;
        proxy_set_header Host $host;
    }
}
