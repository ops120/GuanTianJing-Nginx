upstream origin_server {
    server 10.0.3.10:8080;
    server 10.0.3.11:8080;
}

upstream cdn_cache {
    server 192.168.220.10:6081;
    server 192.168.220.11:6081;
    server 192.168.220.12:6081;
}

server {
    listen 80;
    server_name cdn-edge-01.example.com;
    
    location / {
        proxy_pass http://origin_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-CDN-Node cdn-edge-01;
        
        proxy_cache_valid 200 1h;
        proxy_cache_valid 404 1m;
    }
    
    location /images/ {
        proxy_pass http://cdn_cache;
        proxy_set_header Host $host;
        
        proxy_cache_valid 200 24h;
        expires 7d;
    }
    
    location /videos/ {
        proxy_pass http://origin_server;
        proxy_set_header Host $host;
        
        proxy_cache_valid 200 2h;
        expires 1d;
    }
    
    location /static/ {
        proxy_pass http://cdn_cache;
        proxy_set_header Host $host;
        
        proxy_cache_valid 200 12h;
        expires 30d;
    }
}

server {
    listen 443 ssl;
    server_name cdn-edge-01.example.com;
    
    ssl_certificate /etc/nginx/ssl/cdn.crt;
    ssl_certificate_key /etc/nginx/ssl/cdn.key;
    
    location / {
        proxy_pass http://origin_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
