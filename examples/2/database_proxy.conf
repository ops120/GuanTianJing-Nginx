upstream mysql_primary {
    server 192.168.200.10:3306;
}

upstream mysql_replica {
    least_conn;
    server 192.168.200.20:3306;
    server 192.168.200.21:3306;
    server 192.168.200.22:3306;
}

upstream redis_cluster {
    server 192.168.200.30:6379;
    server 192.168.200.31:6379;
    server 192.168.200.32:6379;
}

upstream mongodb_cluster {
    server 192.168.200.40:27017;
    server 192.168.200.41:27017;
    server 192.168.200.42:27017;
}

server {
    listen 8080;
    server_name db-proxy.internal;
    
    location /mysql/write {
        proxy_pass http://mysql_primary;
        proxy_set_header Host $host;
    }
    
    location /mysql/read {
        proxy_pass http://mysql_replica;
        proxy_set_header Host $host;
    }
    
    location /redis {
        proxy_pass http://redis_cluster;
        proxy_set_header Host $host;
    }
    
    location /mongodb {
        proxy_pass http://mongodb_cluster;
        proxy_set_header Host $host;
    }
    
    location /health {
        return 200 'DB Proxy OK';
        add_header Content-Type text/plain;
    }
}
