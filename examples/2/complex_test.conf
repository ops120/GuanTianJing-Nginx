upstream app_cluster_alpha {
    least_conn;
    server 192.168.1.10:8080 weight=8;
    server 192.168.1.11:8080 weight=6;
    server 192.168.1.12:8080 weight=4;
    server 192.168.1.13:8080;
}

upstream app_cluster_beta {
    ip_hash;
    server 192.168.2.10:8080;
    server 192.168.2.11:8080;
    server 192.168.2.12:8080;
}

upstream database_write {
    server 192.168.10.10:5432;
}

upstream database_read {
    round_robin;
    server 192.168.10.20:5432;
    server 192.168.10.21:5432;
    server 192.168.10.22:5432;
}

upstream cache_servers {
    server 192.168.11.10:6379;
    server 192.168.11.11:6379;
    server 192.168.11.12:6379;
}

server {
    listen 80;
    server_name alpha.example.com;
    
    location / {
        proxy_pass http://app_cluster_alpha;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Cluster alpha;
    }
    
    location /beta/ {
        proxy_pass http://app_cluster_beta;
        proxy_set_header Host $host;
        proxy_set_header X-Cluster beta;
    }
}

server {
    listen 80;
    server_name beta.example.com;
    
    location / {
        proxy_pass http://app_cluster_beta;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 8080;
    server_name db-proxy.example.com;
    
    location /write {
        proxy_pass http://database_write;
        proxy_set_header Host $host;
    }
    
    location /read {
        proxy_pass http://database_read;
        proxy_set_header Host $host;
    }
    
    location /cache {
        proxy_pass http://cache_servers;
        proxy_set_header Host $host;
    }
}
