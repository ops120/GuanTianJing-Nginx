upstream auth_service {
    server 192.168.100.10:8081;
    server 192.168.100.11:8081;
}

upstream user_service {
    server 192.168.100.20:8001;
    server 192.168.100.21:8001;
    server 192.168.100.22:8001;
}

upstream order_service {
    server 192.168.100.30:8002;
    server 192.168.100.31:8002;
}

upstream payment_service {
    server 192.168.100.40:8003;
    server 192.168.100.41:8003;
}

upstream product_service {
    server 192.168.100.50:8004;
    server 192.168.100.51:8004;
}

server {
    listen 80;
    server_name api-gateway.internal;
    
    location /api/auth {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /api/users {
        proxy_pass http://user_service;
        proxy_set_header Host $host;
        proxy_set_header X-User-ID $http_x_user_id;
    }
    
    location /api/orders {
        proxy_pass http://order_service;
        proxy_set_header Host $host;
    }
    
    location /api/payments {
        proxy_pass http://payment_service;
        proxy_set_header Host $host;
    }
    
    location /api/products {
        proxy_pass http://product_service;
        proxy_set_header Host $host;
    }
    
    location /health {
        return 200 'API Gateway OK';
        add_header Content-Type text/plain;
    }
}
