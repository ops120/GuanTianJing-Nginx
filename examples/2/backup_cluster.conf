upstream primary_web_cluster {
    server 10.1.1.10:8080 weight=10;
    server 10.1.1.11:8080 weight=10;
    server 10.1.1.12:8080 weight=5;
}

upstream backup_web_cluster {
    server 10.1.2.10:8080;
    server 10.1.2.11:8080;
}

upstream disaster_recovery {
    server 203.0.113.10:8080;
}

server {
    listen 80;
    server_name primary.example.com;
    
    location / {
        proxy_pass http://primary_web_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        proxy_connect_timeout 3s;
        proxy_next_upstream error timeout http_502;
    }
    
    location /api/ {
        proxy_pass http://primary_web_cluster;
        proxy_set_header Host $host;
        
        proxy_connect_timeout 5s;
        proxy_next_upstream error timeout http_500 http_502;
    }
}

server {
    listen 80;
    server_name backup.example.com;
    
    location / {
        proxy_pass http://backup_web_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Backup "true";
    }
}

server {
    listen 80;
    server_name dr.example.com;
    
    location / {
        proxy_pass http://disaster_recovery;
        proxy_set_header Host $host;
        proxy_set_header X-DR-Mode "true";
    }
}
