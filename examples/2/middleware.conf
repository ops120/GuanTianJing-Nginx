upstream kafka_broker {
    server 192.168.210.10:9092;
    server 192.168.210.11:9092;
    server 192.168.210.12:9092;
}

upstream rabbitmq_cluster {
    server 192.168.210.20:5672;
    server 192.168.210.21:5672;
}

upstream elasticsearch_cluster {
    server 192.168.210.30:9200;
    server 192.168.210.31:9200;
    server 192.168.210.32:9200;
}

upstream prometheus_server {
    server 192.168.210.40:9090;
}

server {
    listen 9091;
    server_name middleware-gateway.internal;
    
    location /kafka {
        proxy_pass http://kafka_broker;
        proxy_set_header Host $host;
    }
    
    location /rabbitmq {
        proxy_pass http://rabbitmq_cluster;
        proxy_set_header Host $host;
    }
    
    location /elasticsearch {
        proxy_pass http://elasticsearch_cluster;
        proxy_set_header Host $host;
    }
    
    location /metrics {
        proxy_pass http://prometheus_server;
        proxy_set_header Host $host;
    }
    
    location /health {
        return 200 'Middleware Gateway OK';
        add_header Content-Type text/plain;
    }
}
