upstream proxy_service_c {
    # 指向 Nginx C 的服务名
    server 192.168.1.20:80;
    keepalive 16;
}

server {
    listen 80;
    server_name 192.168.1.11;

    # 1. 复杂匹配：API 请求转发给 Nginx C
    location /api/ {
        # 重写路径，去掉 /api 前缀再传给 C
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://proxy_service_c;
        
        proxy_set_header X-Service-Source "Nginx-B-Front";
        proxy_set_header Host $host;
    }

    # 2. 静态资源：直接在 B 这一层处理，不往后传
    location /static/ {
        root /var/www/html;
        expires 30d;
        add_header Cache-Control "public";
    }
}